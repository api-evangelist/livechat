asyncapi: "2.6.0"
info:
  title: LiveChat Webhooks and RTM API
  version: "v3.5"
  description: >-
    AsyncAPI definition for LiveChat's asynchronous event surfaces:
    HTTP webhooks (registered via the Configuration API) and the
    Agent Chat Real-Time Messaging (RTM) WebSocket API. Webhooks and
    RTM pushes share the same payload shapes; both deliver chat,
    event, customer, and configuration events out of the LiveChat
    Text Platform. Authentication uses OAuth 2.x access tokens or
    Personal Access Tokens. Webhook event types are registered via
    the Configuration API webhook management methods
    (register_webhook, list_webhooks, unregister_webhook,
    list_webhook_names, enable_license_webhook,
    disable_license_webhook, get_license_webhooks_state).
  contact:
    name: LiveChat / Text Platform
    url: https://platform.text.com/docs
defaultContentType: application/json

servers:
  webhooks:
    url: https://{webhook_url}
    protocol: https
    description: >-
      Customer-owned HTTPS endpoint registered through the
      Configuration API register_webhook method. LiveChat POSTs
      JSON event payloads to this URL when registered actions
      occur.
    variables:
      webhook_url:
        description: Fully qualified host and path of the registered webhook receiver.
        default: example.com/livechat/webhook
  rtm:
    url: api.livechatinc.com/v3.5/agent/rtm/ws
    protocol: wss
    description: >-
      Agent Chat Real-Time Messaging WebSocket endpoint. Clients
      must authorize within 30 seconds of connection and ping the
      server every 15 seconds to keep the connection alive.

channels:
  chats/incoming_chat:
    description: A new chat has been started.
    subscribe:
      operationId: onIncomingChat
      message:
        $ref: "#/components/messages/IncomingChat"
