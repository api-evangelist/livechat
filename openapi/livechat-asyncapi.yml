  schemas:
    EventEnvelope:
      type: object
      description: >-
        Common envelope. Webhook deliveries wrap the event in an
        outer object with action, license_id, organization_id and
        payload. RTM pushes wrap the event with action, type=push
        and payload. The action field equals the event name; the
        payload schema is action-specific.
      properties:
        action:
          type: string
          description: Action / event name (e.g. incoming_chat).
        type:
          type: string
          description: Message type (for RTM pushes this is "push").
          enum:
            - push
        license_id:
          type: integer
          description: Numeric LiveChat license identifier (webhook deliveries).
        organization_id:
          type: string
          format: uuid
          description: Organization identifier (webhook deliveries).
        additional_data:
          type: array
          description: Optional additional context configured at webhook registration.
          items:
            type: string
        payload:
          type: object
          description: Action-specific payload; shape varies by action.
          additionalProperties: true
      required:
        - action
        - payload

    RTMRequest:
      type: object
      description: Request message sent by an RTM client.
      properties:
        version:
          type: string
          description: API version (optional).
        request_id:
          type: string
          description: Client-provided request identifier (optional).
        action:
          type: string
          description: Action name.
        payload:
          type: object
          additionalProperties: true
      required:
        - action

    RTMResponse:
      type: object
      description: Response message returned by the RTM server to a client request.
      properties:
        request_id:
          type: string
        action:
          type: string
        type:
          type: string
          enum:
            - response
        success:
          type: boolean
        payload:
          type: object
          additionalProperties: true
      required:
        - action
        - type
        - success

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: OAuth 2.x access token or Personal Access Token.
